version: 0.2

# Headless Poirot: Claude Code investigates a log-error spike / production
# incident on shared CodeBuild compute, under a read-only IAM role, and writes a
# report. Claude Code authenticates with a Claude subscription token, so usage is
# billed against the plan rather than per API token.

env:
  shell: bash
  secrets-manager:
    # Claude subscription OAuth token from `claude setup-token`. Populate after deploy.
    CLAUDE_CODE_OAUTH_TOKEN: poirot-agent/claude-token

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm install -g @anthropic-ai/claude-code
      - npm ci
      - npm run build
      # Log tool versions for debugging.
      - claude --version
      - aws --version

  pre_build:
    commands:
      - ': "${TRIGGER:?TRIGGER is required (pass via --environment-variables-override)}"'
      # Read-only investigator profile. Claude Code's AWS CLI calls assume this
      # role on demand; the build role itself only has assume + sns:publish + logs.
      - |
        mkdir -p ~/.aws
        cat > ~/.aws/config <<EOF
        [profile investigator]
        role_arn = ${INVESTIGATOR_ROLE_ARN}
        credential_source = EcsContainer
        region = ${AWS_REGION}
        EOF

  build:
    commands:
      - set -euo pipefail
      - node dist/src/investigate.js

  post_build:
    commands:
      - |
        if [ "${CODEBUILD_BUILD_SUCCEEDING:-1}" = "1" ]; then
          echo "✅ Investigation complete. See the report above${REPORT_SNS_TOPIC_ARN:+ and the SNS notification}."
        else
          echo "❌ Investigation failed, see ${CODEBUILD_BUILD_URL:-the CodeBuild console}."
        fi
